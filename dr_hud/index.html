<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DR_Hud</title>
    <link rel="stylesheet" href="../assets/css/app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      .settings-fade-enter-active, .settings-fade-leave-active { transition: opacity 0.2s ease; }
      .settings-fade-enter, .settings-fade-leave-to { opacity: 0; }
      .stat-slide-enter-active { transition: all 0.25s ease; }
      .stat-slide-leave-active { transition: all 0.25s ease; }
      .stat-slide-enter, .stat-slide-leave-to { opacity: 0; width: 0 !important; margin-right: 0 !important; overflow: hidden; }
    </style>
  </head>

<div id="app">

  <!-- SERVER LOGO - vpravo nahoře -->
  <div v-if="ui" style="position:absolute;top:1.5rem;right:1.5rem;z-index:100;">
    <img src="../assets/img/logo.png" style="height:60px;width:auto;object-fit:contain;">
  </div>

  <!-- SETTINGS MENU -->
  <transition name="settings-fade">
  <div v-if="settingsOpen" style="
    position:fixed; top:0;left:0;right:0;bottom:0;
    z-index:9999;
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(3px) brightness(1.02);
  " @click.self="closeSettings">

    <!-- Glassmorphism panel -->
    <div style="
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(0,220,255,0.25);
      border-radius: 20px;
      width: 400px;
      max-width: 92vw;
      box-shadow:
        0 0 0 1px rgba(0,220,255,0.08) inset,
        0 8px 40px rgba(0,180,255,0.12),
        0 2px 8px rgba(0,0,0,0.18);
      overflow: hidden;
    ">

      <!-- Header -->
      <div style="
        padding: 18px 22px 14px;
        display:flex;align-items:center;justify-content:space-between;
        border-bottom: 1px solid rgba(0,220,255,0.12);
      ">
        <div style="display:flex;align-items:center;gap:10px;">
          <!-- Cyan settings icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="#00DCFF" stroke-width="1.8"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="#00DCFF" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span style="
            font-family:'Orbitron',sans-serif;
            font-size:11px;font-weight:700;
            color:rgba(255,255,255,0.9);
            letter-spacing:3px;
            text-shadow: 0 0 12px rgba(0,220,255,0.5);
          ">NASTAVENÍ HUD</span>
        </div>
        <button @click="closeSettings" style="
          background:rgba(255,255,255,0.06);
          border:1px solid rgba(255,255,255,0.1);
          border-radius:8px;
          width:30px;height:30px;
          cursor:pointer;
          color:rgba(255,255,255,0.5);
          font-size:14px;
          display:flex;align-items:center;justify-content:center;
          transition:all 0.15s;
        "
        @mouseover="$event.currentTarget.style.background='rgba(0,220,255,0.12)';$event.currentTarget.style.color='#fff';$event.currentTarget.style.borderColor='rgba(0,220,255,0.3)'"
        @mouseout="$event.currentTarget.style.background='rgba(255,255,255,0.06)';$event.currentTarget.style.color='rgba(255,255,255,0.5)';$event.currentTarget.style.borderColor='rgba(255,255,255,0.1)'"
        >✕</button>
      </div>

      <!-- Body -->
      <div style="padding:14px 20px 6px;">

        <!-- Section label -->
        <div style="
          font-family:'Orbitron',sans-serif;font-size:8px;
          color:rgba(0,220,255,0.55);letter-spacing:3px;
          margin:4px 0 10px;text-transform:uppercase;
        ">Statistiky hráče</div>

        <template v-for="item in settingsItems1">
          <div :key="item.key" @click="toggleSetting(item.key)" style="
            display:flex;align-items:center;justify-content:space-between;
            padding:9px 12px;
            border-radius:10px;
            cursor:pointer;
            margin-bottom:3px;
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            transition:background 0.15s, border-color 0.15s;
          "
          @mouseover="$event.currentTarget.style.background='rgba(0,220,255,0.07)';$event.currentTarget.style.borderColor='rgba(0,220,255,0.2)'"
          @mouseout="$event.currentTarget.style.background='rgba(255,255,255,0.03)';$event.currentTarget.style.borderColor='rgba(255,255,255,0.06)'"
          >
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:15px;line-height:1;">{{ item.icon }}</span>
              <span style="font-family:'Montserrat',sans-serif;font-size:12px;color:rgba(255,255,255,0.8);font-weight:500;letter-spacing:0.3px;">{{ item.label }}</span>
            </div>
            <!-- Toggle -->
            <div :style="{
              width:'38px',height:'20px',borderRadius:'10px',
              background: settings[item.key] ? 'rgba(0,210,255,0.35)' : 'rgba(255,255,255,0.08)',
              border: settings[item.key] ? '1px solid rgba(0,220,255,0.6)' : '1px solid rgba(255,255,255,0.15)',
              position:'relative',cursor:'pointer',
              transition:'background 0.2s,border 0.2s',
              boxShadow: settings[item.key] ? '0 0 10px rgba(0,220,255,0.25)' : 'none',
            }">
              <div :style="{
                position:'absolute',top:'2px',
                left: settings[item.key] ? '19px' : '2px',
                width:'16px',height:'16px',borderRadius:'50%',
                background: settings[item.key] ? '#00DCFF' : 'rgba(255,255,255,0.35)',
                transition:'left 0.2s,background 0.2s',
                boxShadow: settings[item.key] ? '0 0 8px rgba(0,220,255,0.7)' : 'none',
              }"></div>
            </div>
          </div>
        </template>

        <!-- Section label 2 -->
        <div style="
          font-family:'Orbitron',sans-serif;font-size:8px;
          color:rgba(0,220,255,0.55);letter-spacing:3px;
          margin:14px 0 10px;text-transform:uppercase;
        ">Rozhraní</div>

        <template v-for="item in settingsItems2">
          <div :key="item.key" @click="toggleSetting(item.key)" style="
            display:flex;align-items:center;justify-content:space-between;
            padding:9px 12px;border-radius:10px;cursor:pointer;
            margin-bottom:3px;
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            transition:background 0.15s,border-color 0.15s;
          "
          @mouseover="$event.currentTarget.style.background='rgba(0,220,255,0.07)';$event.currentTarget.style.borderColor='rgba(0,220,255,0.2)'"
          @mouseout="$event.currentTarget.style.background='rgba(255,255,255,0.03)';$event.currentTarget.style.borderColor='rgba(255,255,255,0.06)'"
          >
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:15px;line-height:1;">{{ item.icon }}</span>
              <span style="font-family:'Montserrat',sans-serif;font-size:12px;color:rgba(255,255,255,0.8);font-weight:500;letter-spacing:0.3px;">{{ item.label }}</span>
            </div>
            <div :style="{
              width:'38px',height:'20px',borderRadius:'10px',
              background: settings[item.key] ? 'rgba(0,210,255,0.35)' : 'rgba(255,255,255,0.08)',
              border: settings[item.key] ? '1px solid rgba(0,220,255,0.6)' : '1px solid rgba(255,255,255,0.15)',
              position:'relative',cursor:'pointer',
              transition:'background 0.2s',
              boxShadow: settings[item.key] ? '0 0 10px rgba(0,220,255,0.25)' : 'none',
            }">
              <div :style="{
                position:'absolute',top:'2px',
                left: settings[item.key] ? '19px' : '2px',
                width:'16px',height:'16px',borderRadius:'50%',
                background: settings[item.key] ? '#00DCFF' : 'rgba(255,255,255,0.35)',
                transition:'left 0.2s',
                boxShadow: settings[item.key] ? '0 0 8px rgba(0,220,255,0.7)' : 'none',
              }"></div>
            </div>
          </div>
        </template>

      </div>

      <!-- Footer -->
      <div style="
        padding:12px 20px 16px;
        display:flex;align-items:center;justify-content:space-between;
        margin-top:8px;
      ">
        <span style="font-family:'Montserrat',sans-serif;font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:0.5px;">Ukládá se automaticky</span>
        <button @click="closeSettings" style="
          font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;
          background:rgba(0,210,255,0.15);
          border:1px solid rgba(0,220,255,0.35);
          border-radius:8px;
          color:rgba(0,220,255,0.9);
          padding:7px 18px;cursor:pointer;
          transition:all 0.15s;
          text-shadow:0 0 8px rgba(0,220,255,0.4);
        "
        @mouseover="$event.currentTarget.style.background='rgba(0,210,255,0.25)';$event.currentTarget.style.borderColor='rgba(0,220,255,0.7)';$event.currentTarget.style.color='#fff'"
        @mouseout="$event.currentTarget.style.background='rgba(0,210,255,0.15)';$event.currentTarget.style.borderColor='rgba(0,220,255,0.35)';$event.currentTarget.style.color='rgba(0,220,255,0.9)'"
        >ZAVŘÍT</button>
      </div>

    </div>
  </div>
  </transition>

  <!-- LOCATION -->
  <transition name="settings-fade">
  <div v-if="ui && settings.showLocation && type === 'car'" style="
    position:absolute;
    bottom:20rem;
    left:1.7rem;
  ">
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div ref="locationText1" style="
        font-family:'Orbitron',sans-serif;
        font-size:12px;
        font-weight:700;
        color:rgba(255,255,255,0.85);
        letter-spacing:0.5px;
        line-height:1.2;
      ">{{ location.StreetName1 }}</div>
      <div ref="locationText2" style="
        font-family:'Orbitron',sans-serif;
        font-size:8px;
        font-weight:400;
        color:rgba(0,220,255,0.55);
        letter-spacing:2px;
      ">{{ location.StreetName2 }}</div>
    </div>
  </div>
  </transition>

  <div class="absolute top-[63rem] left-[1.7rem]" v-if="ui">
    <div style="display:flex;flex-direction:row;align-items:flex-end;gap:14px;">

      <!-- MICROPHONE -->
      <transition name="stat-slide">
      <div v-if="settings.showMicrophone" ref="microphone" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="12" height="16" viewBox="0 0 12 16" fill="none">
          <rect x="3.5" y="0.5" width="5" height="8" rx="2.5" :stroke="isTalking ? '#00A3FF' : 'rgba(255,255,255,0.55)'" stroke-width="1" :style="isTalking ? 'filter:drop-shadow(0 0 4px #00A3FF)' : ''"/>
          <path d="M1 7C1 10.3137 3.23858 13 6 13C8.76142 13 11 10.3137 11 7" :stroke="isTalking ? '#00A3FF' : 'rgba(255,255,255,0.55)'" stroke-width="1" stroke-linecap="round" fill="none"/>
          <line x1="6" y1="13" x2="6" y2="15.5" :stroke="isTalking ? '#00A3FF' : 'rgba(255,255,255,0.55)'" stroke-width="1" stroke-linecap="round"/>
          <line x1="3.5" y1="15.5" x2="8.5" y2="15.5" :stroke="isTalking ? '#00A3FF' : 'rgba(255,255,255,0.55)'" stroke-width="1" stroke-linecap="round"/>
        </svg>
        <span :style="{ fontFamily:'Orbitron,sans-serif', fontSize:'11px', fontWeight:'600', lineHeight:'1', letterSpacing:'0.5px', color: isTalking ? '#00A3FF' : 'rgba(255,255,255,0.5)', textShadow: isTalking ? '0 0 8px rgba(0,163,255,0.8)' : 'none' }">MIC</span>
      </div>
      </transition>

      <!-- HEALTH -->
      <transition name="stat-slide">
      <div v-if="settings.showHealth" ref="health" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="14" height="13" viewBox="0 0 14 13" fill="none">
          <path d="M7 12L1.2 6.5C-0.1 5.2 -0.1 3.1 1.2 1.8C2.5 0.5 4.6 0.5 5.9 1.8L7 2.9L8.1 1.8C9.4 0.5 11.5 0.5 12.8 1.8C14.1 3.1 14.1 5.2 12.8 6.5Z" fill="#FC4E51"/>
        </svg>
        <span style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#FC4E51;line-height:1;text-shadow:0 0 10px rgba(252,78,81,0.5);">{{ hud.health }}</span>
      </div>
      </transition>

      <!-- ARMOR -->
      <transition name="stat-slide">
      <div v-if="settings.showArmor" ref="armor" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="13" height="14" viewBox="0 0 13 14" fill="none">
          <path d="M6.5 1L1 3.5V7.5C1 10.5 3.5 13 6.5 13.5C9.5 13 12 10.5 12 7.5V3.5Z" stroke="#00A3FF" stroke-width="1.2" fill="rgba(0,163,255,0.15)" stroke-linejoin="round"/>
        </svg>
        <span style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#00A3FF;line-height:1;text-shadow:0 0 10px rgba(0,163,255,0.5);">{{ hud.armor }}</span>
      </div>
      </transition>

      <!-- HUNGER -->
      <transition name="stat-slide">
      <div v-if="settings.showHunger" ref="hunger" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M10.5 1.5L5.5 6.5M9 0.5V4.5H13M2.5 7C1.5 8.2 1.5 11 4 12C6.5 13 8.5 10.5 7.5 8.5L5 6C3 4 1.2 5 2.5 7Z" stroke="#ADFE00" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#ADFE00;line-height:1;text-shadow:0 0 10px rgba(173,254,0,0.4);">{{ hud.hunger }}</span>
      </div>
      </transition>

      <!-- THIRST -->
      <transition name="stat-slide">
      <div v-if="settings.showThirst" ref="water" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="10" height="14" viewBox="0 0 10 14" fill="none">
          <path d="M5 1C5 1 1 6.5 1 9.5C1 11.7 2.8 13 5 13C7.2 13 9 11.7 9 9.5C9 6.5 5 1 5 1Z" stroke="#00FFF0" stroke-width="1.2" fill="rgba(0,255,240,0.12)" stroke-linejoin="round"/>
        </svg>
        <span style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#00FFF0;line-height:1;text-shadow:0 0 10px rgba(0,255,240,0.4);">{{ hud.thirst }}</span>
      </div>
      </transition>

      <!-- STAMINA -->
      <div ref="oxygen" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="13" height="14" viewBox="0 0 13 14" fill="none">
          <circle cx="6.5" cy="4.5" r="3" stroke="#FFA048" stroke-width="1.2" fill="none"/>
          <path d="M1 13.5C1 11 3.5 9 6.5 9C9.5 9 12 11 12 13.5" stroke="#FFA048" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        </svg>
        <span style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#FFA048;line-height:1;text-shadow:0 0 10px rgba(255,160,72,0.4);">{{ hud.stamina }}</span>
      </div>


    </div>
  </div>
  <!-- SPEEDOMETER -->
  <div ref="animatedElement" v-show="settings.showSpeedometer" style="
    position:absolute;
    bottom:2.2rem;
    right:2rem;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:8px;
  ">

    <!-- Speed number -->
    <div style="display:flex;align-items:baseline;gap:4px;">
      <span style="
        font-family:'Orbitron',sans-serif;
        font-size:64px;
        font-weight:700;
        color:rgba(255,255,255,0.92);
        line-height:1;
        letter-spacing:-2px;
        text-shadow:0 0 30px rgba(0,220,255,0.2);
      ">{{ formattedSpeed }}</span>
      <span style="
        font-family:'Orbitron',sans-serif;
        font-size:11px;
        font-weight:400;
        color:rgba(0,220,255,0.6);
        letter-spacing:2px;
        padding-bottom:10px;
      ">KM/H</span>
    </div>

    <!-- Thin cyan separator -->
    <div style="width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,220,255,0.4),transparent);"></div>

    <!-- Bottom row: fuel | gear | seatbelt | door -->
    <div style="display:flex;align-items:center;gap:16px;">

      <!-- FUEL -->
      <div style="display:flex;align-items:center;gap:6px;">
        <svg width="10" height="13" viewBox="0 0 10 13" fill="none">
          <rect x="1" y="1" width="6" height="11" rx="1" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <rect x="7" y="3" width="2" height="3" rx="0.5" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <rect :y="(1 + 9*(1 - speedometer.fuel/100)).toFixed(1)" x="2" :height="(9*speedometer.fuel/100).toFixed(1)" width="4" rx="0.5" :fill="speedometer.fuel < 20 ? '#FC4E51' : '#00DCFF'"/>
        </svg>
        <span style="
          font-family:'Orbitron',sans-serif;font-size:10px;font-weight:600;
          color:rgba(255,255,255,0.6);letter-spacing:0.5px;
        ">{{ speedometer.fuel }}<span style="font-size:8px;color:rgba(255,255,255,0.3);">L</span></span>
      </div>

      <!-- GEAR -->
      <div style="display:flex;flex-direction:column;align-items:center;">
        <span style="font-family:'Orbitron',sans-serif;font-size:7px;color:rgba(0,220,255,0.45);letter-spacing:1px;">GEAR</span>
        <span ref="gearDisplay" :class="{'animate-gear': speedometer.gearChanged}" style="
          font-family:'Orbitron',sans-serif;
          font-size:22px;font-weight:700;
          color:rgba(255,255,255,0.85);
          line-height:1;
          text-shadow:0 0 12px rgba(0,220,255,0.3);
        ">{{ speedometer.gear }}</span>
      </div>

      <!-- SEATBELT -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <span style="font-family:'Orbitron',sans-serif;font-size:7px;color:rgba(255,255,255,0.3);letter-spacing:1px;">BELT</span>
        <div ref="seatbeltIndicator" style="
          width:8px;height:8px;border-radius:50%;
          transition:background 0.3s,box-shadow 0.3s;
        " :style="{
          background: speedometer.seatbelt ? '#00DCFF' : '#FC4E51',
          boxShadow: speedometer.seatbelt ? '0 0 8px rgba(0,220,255,0.8)' : '0 0 6px rgba(252,78,81,0.7)'
        }"></div>
      </div>

      <!-- DOOR -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <span style="font-family:'Orbitron',sans-serif;font-size:7px;color:rgba(255,255,255,0.3);letter-spacing:1px;">DOOR</span>
        <div ref="doorIndicator" style="
          width:8px;height:8px;border-radius:50%;
          transition:background 0.3s,box-shadow 0.3s;
        " :style="{
          background: speedometer.door ? '#FC4E51' : 'rgba(255,255,255,0.2)',
          boxShadow: speedometer.door ? '0 0 6px rgba(252,78,81,0.7)' : 'none'
        }"></div>
      </div>

    </div>
  </div>

</div>
